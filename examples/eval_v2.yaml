# Well-trained baseline checkpoint.
model:
  target: examples.digits_pipeline:build_model
  checkpoint: examples/checkpoints/digits_v2.pt
dataloader:
  target: examples.digits_pipeline:test_loader
  args: { batch_size: 256 }
metrics:
  - { name: accuracy }
  - { name: f1, args: { average: macro } }
  - { name: precision, args: { average: macro } }
  - { name: recall, args: { average: macro } }
  - { name: top_k_accuracy, args: { k: 3 } }
device: cpu
tag: checkpoint_v2
notes: "40 epochs, well trained"
store: .torchcheck
